services:
  - type: web
    name: ai-agent-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENROUTER_API_KEY
        scope: secret
      - key: DATABASE_URL
        scope: secret
      - key: APP_URL
        fromService:
          type: web
          property: host

  - type: web
    name: ai-agent-frontend
    runtime: static
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: pserv
    name: ai-agent-db
    runtime: postgres14
    plan: free
    ipAllowList: []
    preDeployCommand: echo 'Database setup'
