<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Agent Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px 15px 0 0;
      text-align: center;
    }

    .header h1 { font-size: 24px; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.9; }

    .status-bar {
      background: #f0f4ff;
      padding: 8px 16px;
      font-size: 12px;
      color: #555;
      text-align: center;
      border-bottom: 1px solid #e0e0e0;
    }

    .status-bar.error { background: #fff0f0; color: #c00; }
    .status-bar.success { background: #f0fff4; color: #080; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      animation: slideIn 0.3s ease-in;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { justify-content: flex-end; }
    .message.ai { justify-content: flex-start; }

    .message-content {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 3px;
    }

    .ai .message-content {
      background: #e9ecef;
      color: #333;
      border-bottom-left-radius: 3px;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
      background: #e9ecef;
      border-radius: 12px;
      border-bottom-left-radius: 3px;
    }

    .typing-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typing 1.4s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { opacity: 0.4; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-6px); }
    }

    .input-area {
      padding: 16px;
      border-top: 1px solid #e9ecef;
      background: white;
      border-radius: 0 0 15px 15px;
    }

    .input-wrapper { display: flex; gap: 10px; }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus { border-color: #667eea; }

    button {
      padding: 12px 22px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, opacity 0.2s;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .retry-btn {
      display: block;
      margin: 10px auto 0;
      padding: 8px 20px;
      font-size: 13px;
    }

    .stats {
      font-size: 11px;
      color: #aaa;
      margin-top: 8px;
      text-align: center;
    }

    .welcome {
      text-align: center;
      color: #999;
      padding: 30px 20px;
    }

    .welcome h2 { font-size: 22px; margin-bottom: 8px; color: #667eea; }
    .welcome p { font-size: 13px; line-height: 1.6; }

    @media (max-width: 600px) {
      .container { height: 100vh; max-height: none; border-radius: 0; }
      .header, .input-area { border-radius: 0; }
      .message-content { max-width: 85%; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🤖 AI Agent Chat</h1>
    <p>Powered by OpenRouter · Free AI Models</p>
  </div>

  <div class="status-bar" id="statusBar">⏳ Connecting to server...</div>

  <div class="messages" id="messages">
    <div class="welcome" id="welcomeMsg">
      <h2>👋 Welcome!</h2>
      <p>Please wait while we connect to the AI server...<br>This may take up to 60 seconds on first load.</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="messageInput" placeholder="Type your message here..." autocomplete="off" disabled>
      <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>
    <div class="stats" id="statsText">Initializing...</div>
  </div>
</div>

<script>
  const API_URL = 'https://ai-agent-mh2c.onrender.com';
  let userId, conversationId;
  let isLoading = false;
  let initAttempts = 0;

  const messagesDiv = document.getElementById('messages');
  const messageInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const statsText = document.getElementById('statsText');
  const statusBar = document.getElementById('statusBar');

  function setStatus(msg, type = '') {
    statusBar.textContent = msg;
    statusBar.className = 'status-bar' + (type ? ' ' + type : '');
  }

  async function initChat() {
    initAttempts++;
    setStatus(`⏳ Waking up server... (attempt ${initAttempts})`);

    try {
      // Step 1: ping /api/models first to wake the server
      const pingRes = await fetch(`${API_URL}/api/models`, { signal: AbortSignal.timeout(30000) });
      if (!pingRes.ok) throw new Error('Server ping failed');

      setStatus('🔗 Creating session...');

      // Step 2: init session
      const sessionRes = await fetch(`${API_URL}/api/session/init`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: AbortSignal.timeout(30000)
      });
      if (!sessionRes.ok) throw new Error(`Session failed: ${sessionRes.status}`);
      const sessionData = await sessionRes.json();
      userId = sessionData.userId;

      setStatus('💬 Setting up conversation...');

      // Step 3: create conversation
      const convRes = await fetch(`${API_URL}/api/conversations`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, title: 'Web Chat' }),
        signal: AbortSignal.timeout(30000)
      });
      if (!convRes.ok) throw new Error(`Conversation failed: ${convRes.status}`);
      const convData = await convRes.json();
      conversationId = convData.id;

      // Ready!
      setStatus('✅ Connected! Ready to chat.', 'success');
      statsText.textContent = 'Connected · Ask me anything!';

      document.getElementById('welcomeMsg').innerHTML = `
        <h2>✅ Ready to Chat!</h2>
        <p>You're connected to the AI Agent.<br>Type a message below to get started!</p>
      `;

      messageInput.disabled = false;
      sendBtn.disabled = false;
      messageInput.focus();

    } catch (err) {
      console.error('Init error:', err);
      setStatus(`❌ Connection failed: ${err.message}`, 'error');
      statsText.textContent = 'Failed to connect';

      document.getElementById('welcomeMsg').innerHTML = `
        <h2>⚠️ Connection Failed</h2>
        <p style="color:#c00; margin-bottom:10px">${err.message}</p>
        <p>The server may still be waking up.<br>Please wait and try again.</p>
        <button class="retry-btn" onclick="initChat()">🔄 Retry Connection</button>
      `;
    }
  }

  async function sendMessage() {
    const message = messageInput.value.trim();
    if (!message || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    messageInput.disabled = true;
    messageInput.value = '';

    const welcome = messagesDiv.querySelector('.welcome');
    if (welcome) welcome.remove();

    addMessage(message, 'user');

    // Loading indicator
    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'message ai';
    loadingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    messagesDiv.appendChild(loadingDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;

    const startTime = Date.now();

    try {
      const response = await fetch(`${API_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          conversationId,
          userId,
          message,
          model: 'openrouter/auto'
        }),
        signal: AbortSignal.timeout(120000)
      });

      if (!response.ok) {
        const errText = await response.text();
        throw new Error(`API ${response.status}: ${errText}`);
      }

      loadingDiv.remove();
      const aiContentDiv = addMessage('', 'ai');

      let aiMessage = '';
      let totalTokens = 0;
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');

        for (let i = 0; i < lines.length - 1; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          // Handle SSE format: data: {...}
          if (line.startsWith('data: ')) {
            const raw = line.slice(6).trim();
            if (raw === '[DONE]') continue;
            try {
              const data = JSON.parse(raw);
              // Handle different response formats
              const content = data.content || data.text || data.message ||
                (data.choices && data.choices[0]?.delta?.content) ||
                (data.choices && data.choices[0]?.message?.content) || '';
              if (content) {
                aiMessage += content;
                aiContentDiv.textContent = aiMessage;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
              }
              if (data.totalTokens) totalTokens = data.totalTokens;
              if (data.done && data.response) {
                aiMessage = data.response;
                aiContentDiv.textContent = aiMessage;
              }
            } catch (e) {
              // Plain text chunk
              if (raw && raw !== '[DONE]') {
                aiMessage += raw;
                aiContentDiv.textContent = aiMessage;
              }
            }
          } else {
            // Non-SSE plain text or JSON line
            try {
              const data = JSON.parse(line);
              const content = data.content || data.text || data.message || data.reply || '';
              if (content) {
                aiMessage += content;
                aiContentDiv.textContent = aiMessage;
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
              }
            } catch (e) {
              // ignore non-JSON lines
            }
          }
        }
        buffer = lines[lines.length - 1];
      }

      // If nothing was captured from stream, try the buffer remainder
      if (!aiMessage && buffer.trim()) {
        try {
          const data = JSON.parse(buffer.trim());
          aiMessage = data.content || data.text || data.message || data.reply || '';
          if (aiMessage) aiContentDiv.textContent = aiMessage;
        } catch (e) {}
      }

      if (!aiMessage) {
        aiContentDiv.textContent = '(No response received — please try again)';
      }

      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      statsText.textContent = `⚡ ${elapsed}s · ${totalTokens} tokens`;
      setStatus('✅ Connected · Ready to chat.', 'success');

    } catch (err) {
      loadingDiv.remove();
      console.error('Chat error:', err);
      addMessage(`❌ Error: ${err.message}. Please try again.`, 'ai');
      setStatus('⚠️ Message failed — please retry', 'error');
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      messageInput.disabled = false;
      messageInput.focus();
    }
  }

  function addMessage(text, sender) {
    const div = document.createElement('div');
    div.className = `message ${sender}`;
    const content = document.createElement('div');
    content.className = 'message-content';
    content.textContent = text;
    div.appendChild(content);
    messagesDiv.appendChild(div);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
    return content;
  }

  messageInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter' && !isLoading) sendMessage();
  });

  initChat();
</script>
</body>
</html>
