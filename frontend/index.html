<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Agent Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 800px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 15px 15px 0 0;
      text-align: center;
    }

    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 14px;
      opacity: 0.9;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f8f9fa;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      animation: slideIn 0.3s ease-in;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.ai {
      justify-content: flex-start;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      line-height: 1.5;
      font-size: 14px;
    }

    .user .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-bottom-right-radius: 3px;
    }

    .ai .message-content {
      background: #e9ecef;
      color: #333;
      border-bottom-left-radius: 3px;
    }

    .message.loading .message-content {
      background: #e9ecef;
      color: #666;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #999;
      animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.5;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-10px);
      }
    }

    .input-area {
      padding: 20px;
      border-top: 1px solid #e9ecef;
      background: white;
      border-radius: 0 0 15px 15px;
    }

    .input-wrapper {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    input[type="text"]::placeholder {
      color: #aaa;
    }

    button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 25px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .stats {
      font-size: 12px;
      color: #999;
      margin-top: 10px;
      text-align: center;
    }

    .error {
      background: #fee;
      color: #c33;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 15px;
      border-left: 4px solid #c33;
    }

    .welcome {
      text-align: center;
      color: #999;
      padding: 40px 20px;
    }

    .welcome h2 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #667eea;
    }

    .welcome p {
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .container {
        height: 100vh;
        max-height: none;
        border-radius: 0;
      }

      .header {
        border-radius: 0;
      }

      .input-area {
        border-radius: 0;
      }

      .message-content {
        max-width: 85%;
      }

      .header h1 {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI Agent Chat</h1>
      <p>Powered by OpenRouter - Fastest Response</p>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <h2>👋 Welcome!</h2>
        <p>Start a conversation with the AI. Ask anything!</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <input 
          type="text" 
          id="messageInput" 
          placeholder="Type your message here..."
          autocomplete="off"
        >
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
      <div class="stats">
        <span id="statsText">Ready to chat</span>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://ai-agent-mh2c.onrender.com';
    let userId, conversationId;
    let isLoading = false;

    const messagesDiv = document.getElementById('messages');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statsText = document.getElementById('statsText');

    // Model performance tracking
    let modelPerformance = {
      'openrouter/auto': { avgTime: 0, count: 0 },
      'nousresearch/hermes-3-405b-instruct': { avgTime: 0, count: 0 },
      'meta-llama/llama-3.3-70b-instruct': { avgTime: 0, count: 0 },
      'qwen/qwen-3-coder-480b-a35b-instruct': { avgTime: 0, count: 0 },
      'liquid/lfm2.5-1.2b-instruct': { avgTime: 0, count: 0 },
      'nvidia/nemotron-3.5-content-safety': { avgTime: 0, count: 0 }
    };

    // Get the fastest model based on performance history
    function getFastestModel() {
      let fastestModel = 'openrouter/auto'; // Default fallback
      let fastestTime = Infinity;

      for (const [model, perf] of Object.entries(modelPerformance)) {
        if (perf.count > 0 && perf.avgTime < fastestTime) {
          fastestTime = perf.avgTime;
          fastestModel = model;
        }
      }

      // If no performance data, use auto routing
      if (fastestModel === 'openrouter/auto') {
        return 'openrouter/auto';
      }

      return fastestModel;
    }

    // Update model performance
    function updateModelPerformance(model, responseTime) {
      if (modelPerformance[model]) {
        const perf = modelPerformance[model];
        perf.avgTime = (perf.avgTime * perf.count + responseTime) / (perf.count + 1);
        perf.count++;
      }
    }

    // Initialize chat on page load
    async function initChat() {
      try {
        statsText.textContent = 'Initializing...';
        
        // Create session
        const sessionRes = await fetch(`${API_URL}/api/session/init`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });
        const sessionData = await sessionRes.json();
        userId = sessionData.userId;

        // Create conversation
        const convRes = await fetch(`${API_URL}/api/conversations`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            userId: userId,
            title: 'Web Chat Session'
          })
        });
        const convData = await convRes.json();
        conversationId = convData.id;

        messagesDiv.innerHTML = `
          <div class="welcome">
            <h2>👋 Ready to Chat!</h2>
            <p>You're connected to the AI Agent. Start typing to begin!</p>
          </div>
        `;
        
        statsText.textContent = 'Connected ✓';
      } catch (error) {
        console.error('Init error:', error);
        showError('Failed to initialize chat. Please refresh the page.');
        statsText.textContent = 'Connection failed';
      }
    }

    async function sendMessage() {
      const message = messageInput.value.trim();
      if (!message || isLoading) return;

      isLoading = true;
      sendBtn.disabled = true;
      messageInput.disabled = true;

      // Clear input
      messageInput.value = '';

      // Remove welcome message if present
      const welcome = messagesDiv.querySelector('.welcome');
      if (welcome) welcome.remove();

      // Add user message
      addMessage(message, 'user');

      try {
        // Add loading indicator
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai loading';
        loadingDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
        messagesDiv.appendChild(loadingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        const startTime = Date.now();
        
        // Automatically select the fastest model
        const selectedModel = getFastestModel();
        
        // Send message to AI
        const response = await fetch(`${API_URL}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversationId: conversationId,
            userId: userId,
            message: message,
            model: selectedModel
          })
        });

        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        // Handle streaming response
        let aiMessage = '';
        let totalTokens = 0;
        let responseTime = 0;

        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        loadingDiv.remove();
        const aiMessageDiv = addMessage('', 'ai');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');

          // Process all complete lines
          for (let i = 0; i < lines.length - 1; i++) {
            const line = lines[i];
            if (line.startsWith('data: ')) {
              try {
                const data = JSON.parse(line.slice(6));
                if (data.content) {
                  aiMessage += data.content;
                  aiMessageDiv.textContent = aiMessage;
                  messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
                if (data.totalTokens) totalTokens = data.totalTokens;
                if (data.responseTime) responseTime = data.responseTime;
              } catch (e) {
                console.log('Parse error:', e);
              }
            }
          }

          buffer = lines[lines.length - 1];
        }

        // Update performance stats
        const totalTime = Date.now() - startTime;
        updateModelPerformance(selectedModel, totalTime);
        
        statsText.textContent = `Response: ${totalTime}ms | Tokens: ${totalTokens} | Auto-optimizing...`;

      } catch (error) {
        console.error('Send error:', error);
        loadingDiv.remove();
        showError('Failed to get AI response. Please try again.');
        addMessage(messageInput.value || message, 'user');
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.disabled = false;
        messageInput.focus();
      }
    }

    function addMessage(text, sender) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${sender}`;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.textContent = text;

      messageDiv.appendChild(contentDiv);
      messagesDiv.appendChild(messageDiv);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;

      return contentDiv;
    }

    function showError(errorText) {
      const errorDiv = document.createElement('div');
      errorDiv.className = 'error';
      errorDiv.textContent = '❌ ' + errorText;
      messagesDiv.insertBefore(errorDiv, messagesDiv.firstChild);
    }

    // Event listeners
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !isLoading) {
        sendMessage();
      }
    });

    // Initialize on load
    initChat();
  </script>
</body>
</html>
